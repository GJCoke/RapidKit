[project]
name = "rapidkit-common"
version = "0.1.0"
description = "RapidKit common models, CRUD, schemas and dependencies"
requires-python = ">=3.14"
dependencies = [
    "rapidkit-core",
    "fastapi>=0.115.0",
    "user-agents>=2.2.0",
]

[tool.uv.sources]
rapidkit-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rapidkit_common"]
