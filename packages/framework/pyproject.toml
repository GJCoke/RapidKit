[project]
name = "rapidkit-framework"
version = "0.1.0"
description = "RapidKit plugin runtime: plugin discovery, event bus, HTTP lifecycle"
requires-python = ">=3.14"
dependencies = [
    "rapidkit-core",
    "fastapi>=0.115.0",
    "slowapi>=0.1.9",
    "starlette-context>=0.5.1,<1.0",
    "packaging>=24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rapidkit_framework"]

[tool.uv.sources]
rapidkit-core = { workspace = true }
