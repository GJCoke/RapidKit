[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rapidkit-core"
version = "0.1.0"
description = "RapidKit core infrastructure: config, database, redis, logging, exceptions"
requires-python = ">= 3.14"
dependencies = [
    "pydantic-settings>=2.13.1,<3.0",
    "pydantic[email]>=2.12.4,<3.0",
    "sqlmodel>=0.0.38,<0.1",
    "redis>=7.4.0,<8.0",
    "asyncpg>=0.30.0,<1.0",
    "psycopg[binary,pool]>=3.3.3,<4.0",
    "loguru>=0.7.3",
    "nanoid>=2.0.0",
    "minio>=7.2.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.1,<10.0",
    "pytest-asyncio>=1.3.0,<2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/rapidkit_core"]
