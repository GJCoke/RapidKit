name: monorepo-prod

services:
  # ==================== Infrastructure ====================

  postgresql:
    image: bitnami/postgresql
    container_name: monorepo-postgresql
    environment:
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME:-root}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE:-client}
    volumes:
      - pg-data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USERNAME:-root} -d ${POSTGRESQL_DATABASE:-client}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: monorepo-redis
    command: redis-server --requirepass ${REDIS_ROOT_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_ROOT_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: monorepo-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-root}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Backend ====================

  backend-api:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: prod
    container_name: monorepo-backend-api
    env_file: .env.prod
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8006),2); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery-worker:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: prod
    container_name: monorepo-celery-worker
    command: uv run celery -A src.queues.app worker -l info
    env_file: .env.prod
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: prod
    container_name: monorepo-celery-beat
    command: uv run celery -A src.queues.app beat -S src.queues.scheduler:AsyncDatabaseScheduler -l info
    env_file: .env.prod
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==================== Frontend + Nginx ====================

  nginx:
    build:
      context: ../..
      dockerfile: docker/frontend/Dockerfile
    container_name: monorepo-nginx
    ports:
      - "80:80"
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  minio-data:

networks:
  default:
    name: monorepo-network
