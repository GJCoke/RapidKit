name: monorepo-prod

services:
  # ==================== Infrastructure ====================

  postgresql:
    image: bitnami/postgresql
    container_name: monorepo-prod-postgresql
    env_file: .env.prod
    volumes:
      - prod-pg-data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d client"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: monorepo-prod-redis
    env_file: .env.prod
    command: ["sh", "-c", "redis-server --requirepass $$REDIS_ROOT_PASSWORD"]
    volumes:
      - prod-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_ROOT_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: monorepo-prod-minio
    env_file: .env.prod
    command: server /data --console-address ":9001"
    volumes:
      - prod-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Backend ====================

  backend-api:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: prod
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:latest}
    container_name: monorepo-prod-backend-api
    env_file: .env.prod
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8006),2); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery-worker:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: prod
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:latest}
    container_name: monorepo-prod-celery-worker
    command: uv run celery -A src.queues.app worker -l info
    env_file: .env.prod
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
      target: prod
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:latest}
    container_name: monorepo-prod-celery-beat
    command: uv run celery -A src.queues.app beat -S src.queues.scheduler:AsyncDatabaseScheduler -l info
    env_file: .env.prod
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==================== Frontend + Nginx ====================

  nginx:
    build:
      context: ../..
      dockerfile: docker/frontend/Dockerfile
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: monorepo-prod-nginx
    ports:
      - "18080:80"
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  prod-pg-data:
  prod-redis-data:
  prod-minio-data:

networks:
  default:
    name: monorepo-prod-network
