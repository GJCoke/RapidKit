worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Backend API upstream
    upstream backend {
        server backend-api:8006;
    }

    server {
        listen 80;
        server_name _;

        # ---------- Frontend static files ----------
        root /usr/share/nginx/html;
        index index.html;

        # SPA history mode fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long cache for hashed assets (Vite adds content hash to filenames)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---------- Backend API reverse proxy ----------
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeouts for long-running API calls
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---------- Socket.IO WebSocket proxy ----------
        location /socket.io/ {
            proxy_pass http://backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections can be long-lived
            proxy_read_timeout 86400s;
        }

        # ---------- MinIO proxy ----------
        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # MinIO needs large uploads
            client_max_body_size 100m;
        }
    }
}
